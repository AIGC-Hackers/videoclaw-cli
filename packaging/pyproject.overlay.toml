# pyproject overlay — sdist source-exclude block kept available for future
# sdist publishing. NOT applied to wheel builds: the in-tree pyproject.toml
# already uses `[tool.hatch.build.targets.wheel] packages = ["src/videoclaw"]`
# which whitelists the wheel cleanly (verified: no tests/, deliverables/,
# projects/, models_cache/, .gsd/, mcp-shim/, packaging/ in the produced
# wheel).
#
# When a future milestone adds `uv build --sdist` to dist-verify.sh, this
# block should be merged into a temporary copy of pyproject.toml using a
# build wrapper (since hatchling reads exclusions only from pyproject.toml,
# not from a separate config file). Until then this file is reference-only.
#
# Excluded paths cover what the sdist would otherwise ship:
#   - tests/                 (test suite, not consumer-facing)
#   - docs/deliverables/     (per-episode produced artifacts)
#   - projects/              (runtime project data)
#   - models_cache/          (downloaded checkpoints)
#   - examples/              (example scripts referenced by docs)
#   - .gsd/                  (gsd workflow database, dev-only)
#   - mcp-shim/              (sibling distributable, ships its own wheel)
#   - packaging/             (this packaging recipe — meta-only)
#
# Note: this file does NOT alter pyproject.toml. Per the blueprint write-scope
# lock the in-tree pyproject.toml stays unchanged. CI invokes uv build with
# --config-file pointing here. Local `make install` keeps using the in-tree
# pyproject.toml unchanged.

[tool.hatch.build.targets.wheel]
packages = ["src/videoclaw"]

[tool.hatch.build.targets.sdist]
exclude = [
    "tests/",
    "docs/deliverables/",
    "projects/",
    "models_cache/",
    "examples/",
    ".gsd/",
    "mcp-shim/",
    "packaging/",
    ".bg-shell/",
    ".mcp.json",
    ".pytest_cache/",
    ".ruff_cache/",
    ".mypy_cache/",
]
